<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CueHalo</title>
    <link rel="stylesheet" href="./control.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark"></span>
          <div>
            <h1>CueHalo</h1>
            <p>Presentation-ready click cues</p>
          </div>
        </div>

        <label class="switch" title="Turn click highlighting on or off">
          <input id="enabled" type="checkbox" />
          <span></span>
        </label>
      </header>

      <main class="content">
        <section class="hero-card">
          <div class="hero-copy">
            <div id="platformStatus" class="status" aria-live="polite">
              <span class="status-dot"></span>
              <span id="platformMessage">Checking platform support...</span>
            </div>

            <h2>Make every click easy to follow.</h2>
            <p>Highlight taps during demos, product reviews, training calls, and screen shares without covering the work.</p>

            <div class="actions">
              <button id="test" type="button" class="mat-filled">Preview</button>
              <button id="reset" type="button" class="mat-outlined">Reset</button>
            </div>
          </div>

          <div class="preview" aria-hidden="true">
            <div class="preview-ring"></div>
            <div class="preview-cursor"></div>
          </div>
        </section>

        <nav class="mode-tabs" aria-label="Highlight presets">
          <button type="button" class="preset active" data-preset="demo">Demo</button>
          <button type="button" class="preset" data-preset="review">Review</button>
          <button type="button" class="preset" data-preset="subtle">Subtle</button>
        </nav>

        <section class="settings-grid" aria-label="Highlight settings">
          <section class="settings-card">
            <div class="section-title">
              <!-- <span class="section-icon">A</span> -->
              <div>
                <h3>Appearance</h3>
                <p>Color, scale, and timing</p>
              </div>
            </div>

            <div class="color-grid">
              <label>
                <span>Color</span>
                <input id="color" type="color" />
              </label>

              <label>
                <span>Inner color</span>
                <input id="secondaryColor" type="color" />
              </label>
            </div>

            <label>
              <span>Ring size</span>
              <input id="size" type="range" min="48" max="180" step="4" />
              <output id="sizeValue"></output>
            </label>

            <label>
              <span>Fade speed</span>
              <input id="duration" type="range" min="260" max="1400" step="20" />
              <output id="durationValue"></output>
            </label>

            <label>
              <span>Stroke</span>
              <input id="stroke" type="range" min="2" max="12" step="1" />
              <output id="strokeValue"></output>
            </label>
          </section>

          <section class="settings-card">
            <div class="section-title">
              <!-- <span class="section-icon">B</span> -->
              <div>
                <h3>Behavior</h3>
              <p>Visibility and click types</p>
              </div>
            </div>

            <label>
              <span>Glow</span>
              <input id="glow" type="range" min="0" max="80" step="4" />
              <output id="glowValue"></output>
            </label>

            <label>
              <span>Opacity</span>
              <input id="opacity" type="range" min="35" max="100" step="1" />
              <output id="opacityValue"></output>
            </label>

            <label>
              <span>Label position</span>
              <select id="labelPosition">
                <option value="bottom">Bottom</option>
                <option value="top">Top</option>
              </select>
            </label>

            <label>
              <span>Label text</span>
              <input id="labelText" type="text" maxlength="18" placeholder="Click" />
            </label>

            <div class="check-row">
              <label><input id="showLabel" type="checkbox" />Labels</label>
              <label><input id="doubleRing" type="checkbox" />Double ring</label>
              <label><input id="followThrough" type="checkbox" />Center flash</label>
              <label><input id="left" type="checkbox" />Left click</label>
              <label><input id="right" type="checkbox" />Right click</label>
              <label><input id="middle" type="checkbox" />Middle click</label>
            </div>
          </section>
        </section>
      </main>
    </div>
    <script src="./control.js"></script>
  </body>
</html>
