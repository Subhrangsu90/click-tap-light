<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClickLight</title>
    <link rel="stylesheet" href="./control.css" />
  </head>
  <body>
    <main class="control-app" aria-label="ClickLight controls">
      <section class="control-panel">
        <header class="panel-bar">
          <div class="brand" aria-label="ClickLight">
            <span class="brand-mark" aria-hidden="true"></span>
            <span class="brand-name">ClickLight</span>
          </div>

          <div class="app-title">
            <span>Controls</span>
            <kbd>Ctrl</kbd>
            <span>+</span>
            <kbd>Alt</kbd>
            <span>+</span>
            <kbd>C</kbd>
          </div>

          <div class="window-tools">
            <button id="themeToggle" class="theme-button" type="button" title="Theme" aria-label="Toggle theme">☾</button>
            <label class="switch" title="Turn click highlighting on or off">
              <input id="enabled" type="checkbox" />
              <span></span>
            </label>
            <button id="minimizeWindow" class="icon-button" type="button" title="Minimize" aria-label="Minimize">−</button>
            <button id="closeWindow" class="icon-button" type="button" title="Hide controller" aria-label="Hide controller">×</button>
          </div>
        </header>

        <div class="command-row">
          <label class="label-field">
            <span>Label text</span>
            <input id="labelText" type="text" maxlength="18" placeholder="Click" aria-label="Click label" />
          </label>
          <button id="test" class="primary-action" type="button">Preview</button>
          <button id="reset" class="icon-action" type="button" title="Reset">↺</button>
        </div>

        <div class="quick-row" aria-label="Quick controls">
          <button id="quickPreview" class="small-action" type="button" title="Preview click">+</button>
          <label class="share-chip"><input id="showKeystrokes" type="checkbox" />Keys</label>
          <label class="share-chip"><input id="showLabel" type="checkbox" />Label</label>
          <label class="share-chip"><input id="launchAtStartup" type="checkbox" />Startup</label>
        </div>

        <div class="feature-panel" aria-label="Highlight settings">
          <div class="top-settings">
            <nav class="mode-tabs" aria-label="Highlight presets">
              <button type="button" class="preset active" data-preset="demo">Demo</button>
              <button type="button" class="preset" data-preset="review">Review</button>
              <button type="button" class="preset" data-preset="subtle">Subtle</button>
            </nav>
            <label title="Highlight color"><span>Primary</span><input id="color" type="color" /></label>
            <label title="Inner color"><span>Inner</span><input id="secondaryColor" type="color" /></label>
            <label title="Label position">
              <span>Position</span>
              <select id="labelPosition">
                <option value="bottom">Bottom</option>
                <option value="top">Top</option>
              </select>
            </label>
          </div>

          <div class="sliders" aria-label="Size and speed">
            <label>
              <span>Size</span>
              <input id="size" type="range" min="48" max="180" step="4" />
              <output id="sizeValue"></output>
            </label>
            <label>
              <span>Fade</span>
              <input id="duration" type="range" min="260" max="1400" step="20" />
              <output id="durationValue"></output>
            </label>
            <label>
              <span>Stroke</span>
              <input id="stroke" type="range" min="2" max="12" step="1" />
              <output id="strokeValue"></output>
            </label>
            <label>
              <span>Glow</span>
              <input id="glow" type="range" min="0" max="80" step="4" />
              <output id="glowValue"></output>
            </label>
            <label>
              <span>Opacity</span>
              <input id="opacity" type="range" min="35" max="100" step="1" />
              <output id="opacityValue"></output>
            </label>
            <label>
              <span>Keys</span>
              <input id="keystrokeDuration" type="range" min="500" max="2400" step="100" />
              <output id="keystrokeDurationValue"></output>
            </label>
          </div>

          <div class="check-grid" aria-label="Effects and mouse buttons">
            <label title="Draw a second ring around the click"><input id="doubleRing" type="checkbox" />Double ring</label>
            <label title="Flash the center of the click"><input id="followThrough" type="checkbox" />Center flash</label>
            <label title="Highlight left mouse clicks"><input id="left" type="checkbox" />Left click</label>
            <label title="Highlight right mouse clicks"><input id="right" type="checkbox" />Right click</label>
            <label title="Highlight middle mouse or wheel clicks"><input id="middle" type="checkbox" />Wheel click</label>
          </div>
        </div>

        <div id="platformStatus" class="status" aria-live="polite">
          <span class="status-dot"></span>
          <span id="platformMessage">Checking platform support...</span>
        </div>
      </section>
    </main>
    <script src="./control.js"></script>
  </body>
</html>
