<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1.0" />
		<title>RippleClick</title>
		<link
			rel="stylesheet"
			href="./control.css" />
	</head>
	<body>
		<main
			class="control-app compact-app"
			aria-label="RippleClick controls">
			<section class="control-panel compact-panel">
				<header class="panel-bar compact-bar">
					<div
						class="brand"
						aria-label="RippleClick">
						<span
							class="brand-mark"
							aria-hidden="true">
							<span class="material-symbols-rounded"
								>ads_click</span
							>
						</span>
						<span class="brand-name">RippleClick</span>
					</div>

					<div class="window-tools">
						<button
							id="minimizeWindow"
							class="icon-button"
							type="button"
							title="Minimize"
							aria-label="Minimize">
							<span class="material-symbols-rounded">remove</span>
						</button>
						<button
							id="closeWindow"
							class="icon-button"
							type="button"
							title="Hide controller"
							aria-label="Hide controller">
							<span class="material-symbols-rounded">close</span>
						</button>
					</div>
				</header>

				<div class="compact-actions">
					<span
						id="statusPill"
						class="status-pill paused">
						<span class="material-symbols-rounded"
							>hourglass_empty</span
						>
						Starting
					</span>

					<label
						class="switch"
						title="Turn click highlighting on or off">
						<input
							id="enabled"
							type="checkbox" />
						<span></span>
					</label>

					<button
						id="test"
						class="primary-action"
						type="button"
						title="Preview click">
						<span class="material-symbols-rounded">play_arrow</span>
						Preview
					</button>

					<label
						class="share-chip"
						title="Controller stays above the overlay while open">
						<input
							id="keepOnTop"
							type="checkbox" />Pin
					</label>

					<button
						id="openSettings"
						class="icon-action"
						type="button"
						title="Open settings"
						aria-label="Open settings">
						<span class="material-symbols-rounded">settings</span>
					</button>
				</div>
			</section>
		</main>
		<script src="./control.js"></script>
	</body>
</html>
